<navigation-bar></navigation-bar>

<div
  #table
  class="table"
  [attr.data-color]="tableColor()"
  [style.height]="heightStyle()"
  (pointerdown)="onTablePointerDown($event)"
>
  <div class="card-layer">
    @for (pattern of patternCards(); track pattern.id) {
      <table-pattern-card
        [card]="pattern"
        [widthPercent]="cardSizePercent()"
        [tableWidthPx]="tableWidthPx()"
        [selected]="selectedCardId() === pattern.id"
        [active]="activePatternId() === pattern.id"
        [dimmed]="fortuneActive() && activePatternId() !== pattern.id"
        (cardSelect)="selectCard(pattern.id)"
        (cardMove)="movePatternCard(pattern.id, $event)"
        (cardRotate)="rotatePatternCard(pattern.id, $event)"
        (textChange)="setPatternText(pattern.id, $event)"
      />
    }
    @for (card of cards(); track card.id) {
      <table-card
        [card]="card"
        [widthPercent]="cardSizePercent()"
        [tableWidthPx]="tableWidthPx()"
        [selected]="selectedCardId() === card.id"
        [pickMode]="fortuneActive() && !card.patternText"
        (cardSelect)="selectCard(card.id)"
        (cardFlip)="flipCard(card.id)"
        (cardMove)="moveCard(card.id, $event)"
        (cardRotate)="rotateCard(card.id, $event)"
        (cardInfo)="openCardInfo(card.id)"
        (cardPick)="pickCard(card.id)"
      />
    }
  </div>
  <button class="settings-btn" type="button" aria-label="Table settings" (click)="settingsOpen.set(true)">⚙</button>
  <div class="height-controls">
    <button class="height-btn height-btn--plus" type="button" aria-label="Increase table height" (click)="increaseHeight()">+</button>
    <button class="height-btn height-btn--minus" type="button" aria-label="Decrease table height" (click)="decreaseHeight()">−</button>
  </div>
  @if (deckMenuOpen() || patternMenuOpen()) {
    <div class="menu-backdrop" (click)="closeMenus()"></div>
  }
  <div #controls class="table-controls">
    <div class="dropdown">
      <button
        class="dropdown-btn deck-menu-btn"
        type="button"
        aria-haspopup="menu"
        [attr.aria-expanded]="deckMenuOpen()"
        [disabled]="fortuneActive()"
        (click)="toggleDeckMenu()"
        (keydown.escape)="closeMenus()"
      >Deck ▾</button>
      @if (deckMenuOpen()) {
        <div class="dropdown-panel" (keydown.escape)="closeMenus()">
          <button class="dropdown-item select-deck-item" type="button" (click)="openDeckSelector()">Select deck</button>
          <button class="dropdown-item reload-deck-item" type="button" [disabled]="cards().length === 0" (click)="reloadDeck()">Re-load deck</button>
        </div>
      }
    </div>
    <div class="dropdown">
      <button
        class="dropdown-btn pattern-menu-btn"
        type="button"
        aria-haspopup="menu"
        [attr.aria-expanded]="patternMenuOpen()"
        [disabled]="fortuneActive()"
        (click)="togglePatternMenu()"
        (keydown.escape)="closeMenus()"
      >Pattern ▾</button>
      @if (patternMenuOpen()) {
        <div class="dropdown-panel" (keydown.escape)="closeMenus()">
          <button class="dropdown-item add-pattern-item" type="button" (click)="closeMenus(); addPatternCard()">Add pattern card</button>
          <button class="dropdown-item lock-pattern-item" type="button" (click)="closeMenus(); toggleLockPattern()">
            {{ patternsLocked() ? 'Unlock pattern' : 'Lock pattern' }}
          </button>
          <button class="dropdown-item start-fortune-item" type="button" [disabled]="patternCards().length === 0 || cards().length === 0" (click)="closeMenus(); startFortuneTelling()">
            Start fortune-telling
          </button>
        </div>
      }
    </div>
  </div>
</div>

@if (settingsOpen()) {
  <table-settings-dialog
    [color]="tableColor()"
    [cardSize]="cardSizePercent()"
    (colorChange)="tableColor.set($event)"
    (cardSizeChange)="onCardSizeChange($event)"
    (closed)="settingsOpen.set(false)"
  />
}

@if (deckSelectorOpen()) {
  <deck-selector
    (deckSelected)="onDeckSelected($event)"
    (closed)="deckSelectorOpen.set(false)"
  />
}

@if (infoCard(); as info) {
  <card-info-dialog
    [imageUrl]="info.frontImageUrl"
    [title]="info.title"
    [description]="info.description"
    (closed)="infoCardId.set(null)"
  />
}

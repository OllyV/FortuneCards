<div
  class="table-card"
  [class.selected]="selected()"
  [style.left.px]="leftPx()"
  [style.top.px]="topPx()"
  [style.width.px]="widthPx()"
  [style.zIndex]="card().z"
  [style.transform]="'rotate(' + card().rotation + 'deg)'"
  (pointerdown)="onPointerDown($event)"
  (pointermove)="onPointerMove($event)"
  (pointerup)="onPointerUp()"
  (pointercancel)="onPointerUp()"
  (dblclick)="cardFlip.emit()"
>
  <div class="flip-inner" [class.flipped]="card().flipped">
    <div class="face back" [style.background]="backStyle()">
      @if (card().backImageUrl) {
        <img class="face-img" [src]="card().backImageUrl" alt="" draggable="false" />
      }
    </div>
    <div class="face front">
      <img class="face-img" [src]="card().frontImageUrl" alt="" draggable="false" />
    </div>
  </div>
  @if (selected()) {
    <div class="rotate-handle" title="Drag to rotate" (pointerdown)="onRotateStart($event)">⤾</div>
  }
  @if (selected() && card().flipped) {
    <div class="info-handle" title="Card info" (pointerdown)="onInfoClick($event)">ⓘ</div>
  }
</div>
